<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR PUZZLE — HORROR EDITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root {
  --bg: #050508;
  --bg2: #0d0d16;
  --bg3: #12121f;
  --card: #0f0f1a;
  --card2: #161625;
  --border: #2a2a45;
  --border2: #3a3a60;
  --accent1: #c84bff;
  --accent2: #ff3366;
  --accent3: #00e5ff;
  --accent4: #ffe600;
  --green: #00ff88;
  --text: #e8e8f0;
  --text2: #9090b0;
  --text3: #5a5a80;
  --glow1: rgba(200,75,255,0.15);
  --glow2: rgba(255,51,102,0.15);
  --glow3: rgba(0,229,255,0.12);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === GRID BACKGROUND === */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(200,75,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,75,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}

/* === SCANLINE OVERLAY === */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
  pointer-events:none; z-index:0;
  animation: scan 8s linear infinite;
}
@keyframes scan {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* === PARTICLES === */
#particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:1; }

/* === LOGIN === */
#loginWrap {
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 50px 40px;
  width: 100%; max-width: 460px;
  position:relative; overflow:hidden;
  box-shadow: 0 0 60px rgba(200,75,255,0.2), 0 0 120px rgba(255,51,102,0.1);
}
.login-card::before {
  content:'';
  position:absolute; top:-2px; left:10%; width:80%; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), transparent);
}
.login-card::after {
  content:'';
  position:absolute; bottom:-2px; left:10%; width:80%; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent2), var(--accent1), transparent);
}
.logo-wrap {
  text-align:center; margin-bottom:40px;
}
.logo-skull {
  font-size:60px; line-height:1;
  filter: drop-shadow(0 0 20px var(--accent1));
  animation: float 3s ease-in-out infinite;
  display:block; margin-bottom:12px;
}
@keyframes float {
  0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}
}
.logo-title {
  font-family:'Creepster', cursive;
  font-size:2.8rem; letter-spacing:3px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-shadow: none;
  line-height:1;
}
.logo-sub {
  font-family:'Space Mono', monospace;
  font-size:0.7rem; color:var(--text3); letter-spacing:4px;
  margin-top:6px;
}

.role-tabs {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:8px; margin-bottom:28px;
}
.role-tab {
  padding:10px 8px; border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text2); font-family:'Rajdhani',sans-serif;
  font-size:0.85rem; font-weight:600; letter-spacing:1px;
  cursor:pointer; transition:all 0.2s;
  text-align:center;
}
.role-tab:hover { border-color:var(--border2); color:var(--text); }
.role-tab.active {
  background: linear-gradient(135deg, rgba(200,75,255,0.2), rgba(255,51,102,0.2));
  border-color:var(--accent1); color:var(--accent1);
  box-shadow: 0 0 12px rgba(200,75,255,0.3);
}
.role-tab i { display:block; font-size:1.2rem; margin-bottom:4px; }

.field-group { margin-bottom:20px; position:relative; }
.field-group label {
  display:block; font-size:0.75rem; font-weight:700;
  letter-spacing:2px; color:var(--text3); margin-bottom:8px;
  text-transform:uppercase;
}
.field-group input {
  width:100%; padding:14px 18px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; color:var(--text);
  font-family:'Rajdhani',sans-serif; font-size:1rem;
  transition:all 0.2s; outline:none;
}
.field-group input:focus {
  border-color:var(--accent1);
  box-shadow:0 0 0 3px rgba(200,75,255,0.1);
}
.field-group input::placeholder { color:var(--text3); }

.btn-primary {
  width:100%; padding:16px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  border:none; border-radius:12px; cursor:pointer;
  font-family:'Bebas Neue', cursive; font-size:1.3rem;
  letter-spacing:3px; color:white;
  transition:all 0.3s; position:relative; overflow:hidden;
  box-shadow: 0 4px 20px rgba(200,75,255,0.4);
}
.btn-primary:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(200,75,255,0.5);
}
.btn-primary:active { transform:translateY(0); }
.btn-primary::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transform:translateX(-100%); transition:transform 0.5s;
}
.btn-primary:hover::before { transform:translateX(100%); }

.hint-text {
  text-align:center; margin-top:20px;
  font-size:0.75rem; color:var(--text3);
  font-family:'Space Mono',monospace; line-height:1.8;
}
.hint-text span { color:var(--accent3); }

/* === LAYOUT === */
#app { display:none; position:relative; z-index:10; min-height:100vh; }

.sidebar {
  position:fixed; left:0; top:0; bottom:0;
  width:260px;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow-y:auto; z-index:100;
  transition:transform 0.3s;
}
.sidebar-logo {
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.sidebar-logo .skull { font-size:28px; filter:drop-shadow(0 0 8px var(--accent1)); }
.sidebar-logo-text h2 {
  font-family:'Creepster',cursive; font-size:1.4rem; letter-spacing:2px;
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.sidebar-logo-text small { font-size:0.65rem; color:var(--text3); letter-spacing:3px; font-family:'Space Mono',monospace; }

.sidebar-user {
  margin:16px 16px 0;
  padding:14px; border-radius:12px;
  background:var(--bg2); border:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.avatar {
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',cursive; font-size:1.2rem;
  box-shadow:0 0 12px rgba(200,75,255,0.4);
}
.avatar-info .name { font-weight:700; font-size:0.95rem; }
.avatar-info .email { font-size:0.7rem; color:var(--text3); font-family:'Space Mono',monospace; word-break:break-all; }

.nav { padding:16px 12px; flex:1; }
.nav-section { margin-bottom:20px; }
.nav-section-title {
  font-size:0.65rem; letter-spacing:3px; color:var(--text3);
  font-weight:700; padding:0 8px 8px; text-transform:uppercase;
}
.nav-link {
  display:flex; align-items:center; gap:12px;
  padding:11px 12px; border-radius:10px;
  color:var(--text2); text-decoration:none; cursor:pointer;
  font-size:0.95rem; font-weight:600; letter-spacing:0.5px;
  transition:all 0.2s; border:1px solid transparent;
  margin-bottom:3px;
}
.nav-link:hover { background:var(--bg2); color:var(--text); border-color:var(--border); }
.nav-link.active {
  background:linear-gradient(90deg, rgba(200,75,255,0.15), transparent);
  color:var(--accent1); border-color:rgba(200,75,255,0.3);
}
.nav-link i { width:18px; text-align:center; font-size:0.9rem; }
.nav-badge {
  margin-left:auto; padding:2px 8px; border-radius:20px;
  font-size:0.7rem; font-weight:700; font-family:'Space Mono',monospace;
}
.nav-badge.red { background:rgba(255,51,102,0.2); color:var(--accent2); }
.nav-badge.green { background:rgba(0,255,136,0.15); color:var(--green); }
.nav-badge.purple { background:rgba(200,75,255,0.15); color:var(--accent1); }

.sidebar-footer {
  padding:16px 12px;
  border-top:1px solid var(--border);
}
.logout-btn {
  width:100%; padding:10px; border-radius:10px;
  background:rgba(255,51,102,0.1); border:1px solid rgba(255,51,102,0.2);
  color:var(--accent2); cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.9rem; font-weight:700;
  letter-spacing:1px; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.logout-btn:hover { background:rgba(255,51,102,0.2); box-shadow:0 0 12px rgba(255,51,102,0.2); }

.main { margin-left:260px; min-height:100vh; padding:28px; }

/* === TOPBAR === */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:28px; padding:16px 24px;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px;
}
.topbar-title { font-family:'Bebas Neue',cursive; font-size:1.6rem; letter-spacing:2px; color:var(--text); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-btn {
  padding:8px 16px; border-radius:8px; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:700;
  letter-spacing:1px; transition:all 0.2s; border:1px solid var(--border2);
  background:var(--bg2); color:var(--text2);
  display:flex; align-items:center; gap:6px;
}
.topbar-btn:hover { color:var(--text); border-color:var(--accent1); }

/* === STAT CARDS === */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr;}}

.stat-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:22px 20px; position:relative; overflow:hidden;
  transition:all 0.3s;
}
.stat-card:hover { transform:translateY(-4px); border-color:var(--border2); }
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.stat-card.c1::before { background:linear-gradient(90deg, var(--accent1), transparent); }
.stat-card.c2::before { background:linear-gradient(90deg, var(--accent2), transparent); }
.stat-card.c3::before { background:linear-gradient(90deg, var(--accent3), transparent); }
.stat-card.c4::before { background:linear-gradient(90deg, var(--accent4), transparent); }
.stat-icon {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; margin-bottom:14px;
}
.stat-card.c1 .stat-icon { background:rgba(200,75,255,0.15); color:var(--accent1); }
.stat-card.c2 .stat-icon { background:rgba(255,51,102,0.15); color:var(--accent2); }
.stat-card.c3 .stat-icon { background:rgba(0,229,255,0.15); color:var(--accent3); }
.stat-card.c4 .stat-icon { background:rgba(255,230,0,0.12); color:var(--accent4); }
.stat-val { font-family:'Bebas Neue',cursive; font-size:2rem; letter-spacing:1px; line-height:1; }
.stat-label { font-size:0.8rem; color:var(--text3); letter-spacing:1.5px; font-weight:700; margin-top:4px; text-transform:uppercase; }

/* === CONTENT CARD === */
.content-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:24px; margin-bottom:20px;
}
.content-card-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.content-card-title {
  font-family:'Bebas Neue',cursive; font-size:1.3rem; letter-spacing:2px;
  display:flex; align-items:center; gap:10px;
}
.content-card-title i { color:var(--accent1); }

/* === TABLE === */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th {
  padding:10px 14px; text-align:left;
  font-size:0.7rem; letter-spacing:2px; font-weight:700;
  color:var(--text3); border-bottom:1px solid var(--border);
  text-transform:uppercase;
}
td {
  padding:12px 14px; border-bottom:1px solid rgba(42,42,69,0.5);
  font-size:0.9rem; font-weight:500;
}
tr:hover td { background:rgba(200,75,255,0.04); }
tr:last-child td { border-bottom:none; }

/* === BADGES === */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:6px;
  font-size:0.72rem; font-weight:700; letter-spacing:1px;
}
.badge-green { background:rgba(0,255,136,0.12); color:var(--green); border:1px solid rgba(0,255,136,0.2); }
.badge-red { background:rgba(255,51,102,0.12); color:var(--accent2); border:1px solid rgba(255,51,102,0.2); }
.badge-purple { background:rgba(200,75,255,0.12); color:var(--accent1); border:1px solid rgba(200,75,255,0.2); }
.badge-yellow { background:rgba(255,230,0,0.1); color:var(--accent4); border:1px solid rgba(255,230,0,0.2); }
.badge-cyan { background:rgba(0,229,255,0.1); color:var(--accent3); border:1px solid rgba(0,229,255,0.2); }

/* === BUTTONS === */
.btn {
  padding:8px 16px; border-radius:8px; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:0.85rem;
  letter-spacing:0.8px; border:1px solid; transition:all 0.2s;
  display:inline-flex; align-items:center; gap:6px;
}
.btn-purple { background:rgba(200,75,255,0.1); border-color:rgba(200,75,255,0.3); color:var(--accent1); }
.btn-purple:hover { background:rgba(200,75,255,0.2); box-shadow:0 0 12px rgba(200,75,255,0.3); }
.btn-red { background:rgba(255,51,102,0.1); border-color:rgba(255,51,102,0.3); color:var(--accent2); }
.btn-red:hover { background:rgba(255,51,102,0.2); }
.btn-green { background:rgba(0,255,136,0.1); border-color:rgba(0,255,136,0.2); color:var(--green); }
.btn-green:hover { background:rgba(0,255,136,0.2); }
.btn-cyan { background:rgba(0,229,255,0.1); border-color:rgba(0,229,255,0.2); color:var(--accent3); }
.btn-cyan:hover { background:rgba(0,229,255,0.2); }
.btn-lg {
  padding:14px 28px; font-size:1rem; border-radius:12px;
  font-family:'Bebas Neue',cursive; letter-spacing:2px; font-weight:400;
}
.btn-grad {
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  border:none; color:white;
  box-shadow:0 4px 16px rgba(200,75,255,0.35);
}
.btn-grad:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(200,75,255,0.45); }

/* === PAGES === */
.page { display:none; }
.page.active { display:block; }

/* === GAME PAGE === */
.game-hero {
  text-align:center; padding:40px 20px 30px;
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; margin-bottom:24px; position:relative; overflow:hidden;
}
.game-hero::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background:radial-gradient(circle, rgba(200,75,255,0.06) 0%, transparent 60%);
  animation:rotate 20s linear infinite;
}
@keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.game-title {
  font-family:'Creepster',cursive; font-size:3rem; letter-spacing:4px;
  background:linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.game-subtitle { color:var(--text2); font-size:0.9rem; letter-spacing:2px; }
.game-fee {
  margin:20px 0;
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 24px; border-radius:100px;
  background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2);
  color:var(--green); font-family:'Space Mono',monospace; font-size:0.9rem;
}

/* === PUZZLE === */
.puzzle-wrap { position:relative; z-index:1; }
.timer-bar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.timer-display {
  font-family:'Bebas Neue',cursive; font-size:2.5rem; letter-spacing:2px;
  color:var(--accent2); line-height:1;
}
.timer-display.warning { color:var(--accent4); animation:pulse 0.5s infinite; }
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

.puzzle-board {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:6px; padding:16px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:16px; max-width:520px; margin:0 auto 20px;
}
.puzzle-piece {
  aspect-ratio:1; border-radius:10px;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',cursive; font-size:1.3rem; letter-spacing:1px;
  cursor:pointer; transition:all 0.2s; color:var(--text2);
  user-select:none;
}
.puzzle-piece:hover { border-color:var(--border2); color:var(--text); transform:scale(1.05); z-index:2; position:relative; }
.puzzle-piece.selected {
  border-color:var(--accent3); color:var(--accent3);
  box-shadow:0 0 16px rgba(0,229,255,0.4);
  background:rgba(0,229,255,0.08);
}
.puzzle-piece.correct {
  border-color:var(--green); color:var(--green);
  background:rgba(0,255,136,0.08);
}

/* === SCRATCH CARD === */
.scratch-outer {
  max-width:440px; margin:0 auto;
  border-radius:20px; overflow:hidden;
  box-shadow:0 0 40px rgba(200,75,255,0.3);
  border:1px solid var(--border2);
}
.scratch-result-bg {
  position:relative; padding:40px 30px;
  background:linear-gradient(135deg, #1a0028, #28001a);
  text-align:center;
}
.scratch-amount {
  font-family:'Bebas Neue',cursive; font-size:4rem; letter-spacing:3px;
  color:var(--accent4); text-shadow:0 0 30px rgba(255,230,0,0.5);
}
.scratch-msg { font-family:'Creepster',cursive; font-size:1.8rem; color:var(--accent1); margin-bottom:12px; }
.scratch-sub { color:var(--text2); font-size:0.9rem; }
#scratchCanvas { display:block; cursor:crosshair; }

/* === QR CARDS === */
.qr-batch-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
.qr-batch-item {
  background:var(--card2); border:1px solid var(--border);
  border-radius:16px; padding:20px; position:relative; overflow:hidden;
  transition:all 0.3s;
}
.qr-batch-item:hover { border-color:var(--border2); transform:translateY(-3px); }
.qr-batch-item::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(200,75,255,0.04), transparent);
  pointer-events:none;
}
.qr-batch-header { display:flex; align-items:start; justify-content:space-between; margin-bottom:16px; }
.qr-batch-name { font-family:'Bebas Neue',cursive; font-size:1.2rem; letter-spacing:1px; }
.qr-batch-meta { font-size:0.8rem; color:var(--text3); margin-top:2px; }
.qr-preview-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:12px 0; }
.qr-thumb {
  background:white; border-radius:6px; padding:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.6rem; color:#333; min-height:64px; overflow:hidden;
}
.qr-thumb canvas, .qr-thumb img { width:100%!important; height:auto!important; }

.progress-bar-wrap {
  height:6px; background:var(--bg2); border-radius:3px; margin:10px 0 14px;
}
.progress-bar-fill { height:100%; border-radius:3px; transition:width 0.5s; }
.progress-bar-fill.green { background:linear-gradient(90deg, var(--green), #00c066); }

/* === WALLET === */

}
.wallet-hero::before {

</style>
</head>

<script>
// ======== PARTICLES ========
(function(){
  const c = document.getElementById('particles-canvas');
  const ctx = c.getContext('2d');
  let W, H, particles = [];
  function resize(){W = c.width = window.innerWidth; H = c.height = window.innerHeight;}
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*1920, y:Math.random()*1080,
      r:Math.random()*2+0.5,
      vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4,
      a:Math.random(),
      color:['rgba(200,75,255,','rgba(255,51,102,','rgba(0,229,255,'][Math.floor(Math.random()*3)]
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+(0.3+Math.sin(Date.now()/1000)*0.2)+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ======== STATE ========
let currentRole = null;
let currentUser = null;
let currentPage = null;
let gameTimer = null;
let gameTimeLeft = 60;
let selectedPiece = null;
let isScratching = false;
let qrBatches = [
  {id:1, name:'Batch #001', total:20, rewards:10, used:15, status:'active', created:'2024-01-10', reward:'₹500 Fixed'},
  {id:2, name:'Batch #002', total:20, rewards:8, used:20, status:'completed', created:'2024-01-08', reward:'₹200-₹800'},
  {id:3, name:'Batch #003', total:15, rewards:5, used:3, status:'active', created:'2024-01-15', reward:'₹300 Fixed'},
];

const CREDS = {user:'user123', admin:'admin123', manager:'manager123'};
const NAVS = {
  user:[
    {page:'dashboard', icon:'fa-home', label:'Dashboard'},
    {page:'game', icon:'fa-gamepad', label:'Play Game', badge:{text:'LIVE',cls:'green'}},
    {page:'wallet', icon:'fa-wallet', label:'My Wallet'},
    {page:'history', icon:'fa-history', label:'Game History'},
    {page:'achievements', icon:'fa-trophy', label:'Achievements'},
    {page:'profile', icon:'fa-user', label:'Profile'},
    {page:'support', icon:'fa-headset', label:'Support', badge:{text:'5',cls:'red'}},
  ],
  admin:[
    {page:'dashboard', icon:'fa-tachometer-alt', label:'Dashboard'},
    {page:'qr-management', icon:'fa-qrcode', label:'QR Management', badge:{text:'3',cls:'purple'}},
    {page:'user-management', icon:'fa-users', label:'Users'},
    {page:'manager-management', icon:'fa-user-tie', label:'Managers'},
    {page:'wallet-control', icon:'fa-wallet', label:'Wallet Control'},
    {page:'game-config', icon:'fa-cog', label:'Game Config'},
    {page:'reports', icon:'fa-chart-bar', label:'Reports'},
    {page:'audit', icon:'fa-shield-alt', label:'Audit Logs'},
  ],
  manager:[
    {page:'dashboard', icon:'fa-tachometer-alt', label:'Dashboard'},
    {page:'manager-users', icon:'fa-users', label:'Users'},
    {page:'manager-kyc', icon:'fa-id-card', label:'KYC Approval', badge:{text:'23',cls:'red'}},
    {page:'manager-withdrawals', icon:'fa-money-bill-wave', label:'Withdrawals', badge:{text:'12',cls:'yellow'}},
    {page:'manager-reports', icon:'fa-chart-line', label:'Reports'},
  ]
};

// ======== LOGIN ========
let selectedRole = 'user';
document.querySelectorAll('.role-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    selectedRole = tab.dataset.role;
    const hints = {user:'user123', admin:'admin123', manager:'manager123'};
    document.getElementById('passIn').value = hints[selectedRole];
  });
});

document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const pass = document.getElementById('passIn').value;
  const email = document.getElementById('emailIn').value;
  if(CREDS[selectedRole] === pass){
    currentRole = selectedRole;
    currentUser = {email, name: email.split('@')[0]};
    showLoader();
    setTimeout(()=>{
      hideLoader();
      initApp();
      notify('Welcome to '+selectedRole.toUpperCase()+' portal!', 'success');
    }, 1200);
  } else {
    notify('Wrong credentials! Try again.', 'error');
    document.getElementById('loginForm').querySelector('input[type=password]').style.borderColor='var(--accent2)';
    setTimeout(()=>document.getElementById('loginForm').querySelector('input[type=password]').style.borderColor='',1500);
  }
});

function initApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  buildSidebar();
  navigate('dashboard');
}

function buildSidebar(){
  const u = document.getElementById('sidebarUser');
  u.innerHTML=`
    <div class="avatar">${currentUser.name[0].toUpperCase()}</div>
    <div class="avatar-info">
      <div class="name">${currentUser.name}</div>
      <div class="email">${currentUser.email}</div>
    </div>
  `;
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML='<div class="nav-section-title">Navigation</div>';
  NAVS[currentRole].forEach(item=>{
    const b = item.badge ? `<span class="nav-badge ${item.badge.cls}">${item.badge.text}</span>`:'';
    const a = document.createElement('div');
    a.className='nav-link'; a.dataset.page=item.page;
    a.innerHTML=`<i class="fas ${item.icon}"></i>${item.label}${b}`;
    a.onclick=()=>navigate(item.page);
    nav.appendChild(a);
  });
}

function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-link').forEach(l=>{
    l.classList.toggle('active', l.dataset.page===page);
  });
  const titles = {
    'dashboard':'Dashboard','game':'Play Game','wallet':'My Wallet',
    'history':'Game History','achievements':'Achievements','profile':'Profile',
    'support':'Support','qr-management':'QR Management','user-management':'User Management',
    'manager-management':'Manager Management','wallet-control':'Wallet Control',
    'game-config':'Game Config','reports':'Reports & Analytics','audit':'Audit Logs',
    'manager-users':'Users','manager-kyc':'KYC Approval','manager-withdrawals':'Withdrawals',
    'manager-reports':'Reports'
  };
  document.getElementById('topbarTitle').textContent = titles[page]||page.replace('-',' ').toUpperCase();
  document.getElementById('sidebar').classList.remove('open');

  const pc = document.getElementById('pageContainer');
  pc.innerHTML='';
  const fn = pages[currentRole+'_'+page] || pages[page];
  if(fn) fn(pc);
  else pc.innerHTML=`<div class="content-card" style="text-align:center;padding:60px 20px;"><div style="font-size:3rem;margin-bottom:16px">🚧</div><h3 style="color:var(--text2)">Coming Soon</h3><p style="color:var(--text3);margin-top:8px">This feature is under development</p></div>`;
}

// ======== PAGES ========
const pages = {};

// --- USER DASHBOARD ---
pages['user_dashboard'] = pages['dashboard'] = function(el){
  if(currentRole!=='user'){pages['admin_dashboard'](el);return;}
  el.innerHTML=`
    <div class="stats-grid">

function startGame(){
  document.getElementById('gameStart').style.display='none';
  document.getElementById('gamePuzzle').style.display='block';
  document.getElementById('gameScratch').style.display='none';
  gameTimeLeft=60; selectedPiece=null;
  generatePuzzle();
  startTimer();
}

function generatePuzzle(){
  const board = document.getElementById('puzzleBoard');
  board.innerHTML='';
  const order=[...Array(10).keys()];
  const shuffled=[...order].sort(()=>Math.random()-0.5);
  shuffled.forEach((val,idx)=>{
    const d=document.createElement('div');
    d.className='puzzle-piece'; d.dataset.val=val; d.dataset.idx=idx;
    d.textContent=val+1;
    d.onclick=()=>clickPiece(d);
    board.appendChild(d);
  });
  updateProgress();
}

function clickPiece(piece){
  if(selectedPiece && selectedPiece!==piece){
    const tv=piece.dataset.val, tt=piece.textContent;
    piece.dataset.val=selectedPiece.dataset.val;
    piece.textContent=selectedPiece.textContent;
    selectedPiece.dataset.val=tv; selectedPiece.textContent=tt;
    selectedPiece.classList.remove('selected');
    selectedPiece=null;
    updateProgress();
    if(checkSolved()) endGame(true);
  } else if(selectedPiece===piece){
    piece.classList.remove('selected'); selectedPiece=null;
  } else {
    if(selectedPiece) selectedPiece.classList.remove('selected');
    piece.classList.add('selected'); selectedPiece=piece;
  }
}

function updateProgress(){
  const pieces=document.querySelectorAll('.puzzle-piece');
  let correct=0;
  pieces.forEach((p,i)=>{ if(parseInt(p.dataset.val)===i){p.classList.add('correct');correct++;}else{p.classList.remove('correct');}});
  const el=document.getElementById('progressTxt');
  if(el)el.textContent=correct+'/10';
}

function checkSolved(){
  const pieces=document.querySelectorAll('.puzzle-piece');
  for(let i=0;i<pieces.length;i++) if(parseInt(pieces[i].dataset.val)!==i) return false;
  return true;
}

function startTimer(){
  clearInterval(gameTimer);
  gameTimer=setInterval(()=>{
    gameTimeLeft--;
    const d=document.getElementById('timerDisplay');
    const p=document.getElementById('timerProgress');
    if(d) d.textContent=gameTimeLeft;
    if(p) p.style.width=(gameTimeLeft/60*100)+'%';
    if(d && gameTimeLeft<=10) d.classList.add('warning');
    if(gameTimeLeft<=0){clearInterval(gameTimer);endGame(false);}
  },1000);
}

function resetPuzzle(){ clearInterval(gameTimer); startGame(); }

function submitPuzzle(){
  if(checkSolved()) endGame(true);
  else notify('Not solved yet! Keep arranging the pieces.','warning');
}

function endGame(won){
  clearInterval(gameTimer);
  if(won){
    document.getElementById('gamePuzzle').style.display='none';
    document.getElementById('gameScratch').style.display='block';
    setTimeout(initScratch,200);
    notify('Puzzle solved! Scratch your card!','success');
  } else {
    notify("Time's up! Try again.",'error');
    setTimeout(()=>{
      document.getElementById('gamePuzzle').style.display='none';
      document.getElementById('gameStart').style.display='block';
    },2000);
  }
}

function initScratch(){
  const c=document.getElementById('scratchCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  c.width=440; c.height=180;
  const g=ctx.createLinearGradient(0,0,440,180);
  g.addColorStop(0,'#1a0028'); g.addColorStop(0.5,'#280018'); g.addColorStop(1,'#0a1a28');
  ctx.fillStyle=g; ctx.fillRect(0,0,440,180);
  ctx.fillStyle='rgba(200,75,255,0.3)';
  for(let i=0;i<20;i++){
    ctx.beginPath(); ctx.arc(Math.random()*440,Math.random()*180,Math.random()*30,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold 20px Rajdhani'; ctx.textAlign='center';
  ctx.fillText('✦ SCRATCH HERE TO REVEAL ✦', 220, 100);
  ctx.font='13px Space Mono'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Use your finger or mouse', 220, 130);
  let scratching=false;
  c.onmousedown=()=>scratching=true;
  c.onmouseup=()=>scratching=false;
  c.onmouseleave=()=>scratching=false;
  c.ontouchstart=()=>scratching=true;
  c.ontouchend=()=>scratching=false;
  c.onmousemove=ev=>{if(!scratching)return;doScratch(c,ctx,ev.offsetX,ev.offsetY);};
  c.ontouchmove=ev=>{
    ev.preventDefault();
    const r=c.getBoundingClientRect();
    doScratch(c,ctx,ev.touches[0].clientX-r.left,ev.touches[0].clientY-r.top);
  };
}
function doScratch(c,ctx,x,y){
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill();
}

function renderBatches(){

  if(!grid)return;
  grid.innerHTML='';
  qrBatches.forEach(b=>{
    const pct=Math.round(b.used/b.total*100);
    const cls=b.status==='active'?'badge-green':b.status==='completed'?'badge-purple':'badge-yellow';
    const div=document.createElement('div');
    div.className='qr-batch-item';
    div.innerHTML=`
      <div class="qr-batch-header">
        <div>
          <div class="qr-batch-name">${b.name}</div>
          <div class="qr-batch-meta">${b.reward} · Created ${b.created}</div>

      </div>
      <div class="qr-preview-grid" id="qrPrev_${b.id}">
        <div class="qr-thumb" id="qrt1_${b.id}"></div>
        <div class="qr-thumb" id="qrt2_${b.id}"></div>
        <div class="qr-thumb" id="qrt3_${b.id}"></div>
      </div>
      <div style="display:flex;gap:12px;font-size:0.8rem;color:var(--text3);margin-bottom:8px">
        <span><b style="color:var(--text)">${b.total}</b> Total</span>
        <span><b style="color:var(--accent1)">${b.rewards}</b> Rewards</span>
        <span><b style="color:var(--green)">${b.used}</b> Used</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill ${b.status==='completed'?'purple':'green'}" style="width:${pct}%"></div></div>
      <div style="font-size:0.72rem;color:var(--text3);margin-bottom:14px;text-align:right">${pct}% used</div>
      <div class="action-btns">
        <button class="btn btn-purple" onclick="viewBatchQRs(${b.id})"><i class="fas fa-eye"></i> View QRs</button>
        <button class="btn btn-cyan" onclick="downloadBatch(${b.id})"><i class="fas fa-download"></i> Export</button>
        ${b.status==='active'?`<button class="btn btn-red" onclick="notify('Batch deactivated','warning')"><i class="fas fa-ban"></i></button>`:''}
      </div>
    `;
    grid.appendChild(div);
    setTimeout(()=>genQRPreviews(b.id, b.name),100);
  });
}

async function genQRPreviews(id, batchName){
  for(let i=1;i<=3;i++){
    const el=document.getElementById(`qrt${i}_${id}`);
    if(!el)continue;
    try{
      const data=`QRPUZZLE:${batchName}:CODE${id}${i}:${Date.now()}`;
      const canvas=document.createElement('canvas');
      await QRCode.toCanvas(canvas, data, {width:56, margin:0, color:{dark:'#000',light:'#fff'}});
      el.innerHTML=''; el.appendChild(canvas);
    }catch(e){}
  }
}

function viewBatchQRs(id){
  const b=qrBatches.find(x=>x.id===id);
  if(!b)return;
  const modal=document.getElementById('qrViewModal');
  document.getElementById('qrViewTitle').innerHTML=`<i class="fas fa-qrcode"></i> ${b.name} — QR Codes`;
  const body=document.getElementById('qrViewBody');
  body.innerHTML=`
    <p style="color:var(--text2);margin-bottom:20px;font-size:0.85rem">${b.total} QR codes in this batch. ${b.rewards} are reward QRs.</p>
    <div id="qrFullGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px"></div>
  `;
  openModal('qrViewModal');
  const grid=document.getElementById('qrFullGrid');
  // Generate first 12 QR codes
  const count=Math.min(b.total,12);
  for(let i=0;i<count;i++){
    const isReward=i<b.rewards;
    const wrapper=document.createElement('div');
    wrapper.style.cssText='text-align:center;';
    wrapper.innerHTML=`
      <div class="qr-full-display" id="qrFull_${id}_${i}"></div>
      <div style="margin-top:6px">
        <span class="badge ${isReward?'badge-yellow':'badge-cyan'}" style="font-size:0.65rem">${isReward?'REWARD':'BLANK'}</span>
        <div style="font-size:0.65rem;color:var(--text3);font-family:'Space Mono',monospace;margin-top:3px">QR-${String(i+1).padStart(3,'0')}</div>
      </div>
    `;
    grid.appendChild(wrapper);
    const data=isReward?`REWARD:${b.name}:${i+1}:₹${500+i*50}`:`NOREWARD:${b.name}:${i+1}`;
    const canvasEl=document.createElement('canvas');
    QRCode.toCanvas(canvasEl, data, {width:70,margin:1,color:{dark:'#000',light:'#fff'}}).then(()=>{
      const qrEl=document.getElementById(`qrFull_${id}_${i}`);
      if(qrEl){qrEl.innerHTML='';qrEl.appendChild(canvasEl);}
    }).catch(()=>{});
  }
  if(b.total>12){
    const more=document.createElement('div');
    more.style.cssText='text-align:center;padding:16px;color:var(--text3);font-size:0.8rem;grid-column:1/-1;';
    more.textContent=`+ ${b.total-12} more QR codes. Export to view all.`;
    grid.appendChild(more);
  }
}

async function downloadBatch(id){
  notify('Preparing batch export...','info');
  const b=qrBatches.find(x=>x.id===id);
  if(!b)return;
  // Create CSV
  let csv='QR_ID,Type,Data,Amount\n';
  for(let i=0;i<b.total;i++){
    const isR=i<b.rewards;
    const amt=isR?500+i*50:0;
    const data=isR?`REWARD:${b.name}:${i+1}:₹${amt}`:`NOREWARD:${b.name}:${i+1}`;
    csv+=`QR-${String(i+1).padStart(3,'0')},${isR?'REWARD':'BLANK'},"${data}",${amt}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${b.name.replace(' ','_')}_export.csv`; a.click();
  notify('Batch exported!','success');
}

function openModal(id){ document.getElementById(id).classList.add('open'); }

function toggleRewardType(){
  const t=document.getElementById('rewardType').value;
  document.getElementById('fixedDiv').style.display=t==='fixed'?'block':'none';
  document.getElementById('randomDiv').style.display=t==='random'?'block':'none';
}

function generateBatch(){
  const name=document.getElementById('batchName').value||'New Batch';
  const total=parseInt(document.getElementById('totalQRs').value)||20;
  const rewards=parseInt(document.getElementById('rewardQRs').value)||10;
  const type=document.getElementById('rewardType').value;
  const rewardStr=type==='fixed'?`₹${document.getElementById('fixedAmt').value} Fixed`:`₹${document.getElementById('minAmt').value}-₹${document.getElementById('maxAmt').value}`;
  showLoader();
  setTimeout(()=>{
    hideLoader();
    closeModal('batchModal');
    const id=qrBatches.length+1;
    qrBatches.unshift({id,name,total,rewards,used:0,status:'active',created:'Jan '+new Date().getDate(),reward:rewardStr});
    notify('QR Batch "'+name+'" created with '+total+' codes!','success');
    if(document.getElementById('batchGrid')) renderBatches();
  },1500);
}

// ======== UTILITIES ========
function notify(msg, type='info'){
  const icons={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
  const n=document.getElementById('notifications');
  const d=document.createElement('div');
  d.className='notif '+type;
  d.innerHTML=`<i class="fas ${icons[type]} notif-icon"></i><div class="notif-msg">${msg}</div>`;
  n.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(100%)';d.style.transition='all 0.3s';setTimeout(()=>n.removeChild(d),300)},3500);
}
function showLoader(){document.getElementById('loader').classList.add('show');}
function hideLoader(){document.getElementById('loader').classList.remove('show');}

    document.getElementById('app').style.display='none';

}
